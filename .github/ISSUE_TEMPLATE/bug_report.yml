name: Bug report
description: Something broke or behaved unexpectedly
body:
  - type: input
    id: platform
    attributes:
      label: OS / platform
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11 / WSL2 Ubuntu"
    validations:
      required: true
  - type: input
    id: cc-version
    attributes:
      label: Claude Code version
      placeholder: "claude --version"
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: Output of `claude-powernap status`
      render: text
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Relevant lines from `claude-powernap log`
      render: text
  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
    validations:
      required: true
