name: publish
on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist + wheel
        run: pipx run build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
